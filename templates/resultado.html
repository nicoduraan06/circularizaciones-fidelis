{% extends "base.html" %}

{% block content %}

<h1>Circularización en progreso</h1>

<div id="progresoContainer">

<p id="contador">Preparando envío...</p>

<div style="width:400px;border:1px solid black;height:30px">

    <div id="barra"
         style="height:30px;width:0%;background-color:green">
    </div>

</div>

</div>

<div id="finalizado" style="display:none; text-align:center;">

<h2>✅ Circularización finalizada</h2>

<br>

<div id="resumen"></div>

<br>

<a href="/">Volver al inicio</a>

</div>

<script>

async function actualizarProgreso(){

    try{

        const res = await fetch("/progreso")
        const data = await res.json()

        let total = data.total || 0
        let enviados = data.enviados || 0
        let errores = data.errores || 0

        if(total === 0){
            return
        }

        let porcentaje = (enviados / total) * 100

        document.getElementById("barra").style.width = porcentaje + "%"

        document.getElementById("contador").innerText =
            enviados + " / " + total + " correos enviados"

        if(enviados >= total){

            document.getElementById("progresoContainer").style.display = "none"
            document.getElementById("finalizado").style.display = "block"

            let enviadosCorrectos = total - errores

            let resumenHTML = `
            <p><b>Correos enviados correctamente:</b> ${enviadosCorrectos}</p>
            <p><b>Errores detectados:</b> ${errores}</p>
            `

            if(errores > 0){

                resumenHTML += `
                <p style="color:#b30000">
                Algunos correos no se pudieron enviar.<br>
                Dirígete al apartado <b>Errores</b> para intentar reenviarlos.
                </p>
                `

            }

            document.getElementById("resumen").innerHTML = resumenHTML

            clearInterval(intervalo)

        }

    }catch(e){
        console.error("Error obteniendo progreso:", e)
    }

}

let intervalo = setInterval(actualizarProgreso, 1000)

</script>

{% endblock %}
