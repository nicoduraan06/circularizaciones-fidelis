{% extends "base.html" %}

{% block content %}

<h1>Circularización en progreso</h1>

<div id="progresoContainer" class="card" style="max-width:600px;">

  <p id="contador" style="color:#666; font-size:16px; margin-bottom:15px;">Preparando envío...</p>

  <div style="width:100%; background:#f0e6f8; border-radius:20px; height:24px; overflow:hidden;">
    <div id="barra" style="height:24px; width:0%; background:#5b2c83; border-radius:20px; transition:width 0.4s ease;"></div>
  </div>

  <p id="porcentaje" style="color:#5b2c83; font-weight:bold; margin-top:10px;">0%</p>

</div>

<div id="finalizado" style="display:none;">

  <div class="card" style="max-width:600px; text-align:center; border-top:4px solid #5b2c83;">

    <p style="font-size:48px; margin:0;">✅</p>
    <h2 style="color:#5b2c83;">Circularización finalizada</h2>

    <div id="resumen" style="margin:20px 0;"></div>

    <a href="/">
      <button>Volver al inicio</button>
    </a>

  </div>

</div>

<script>

async function actualizarProgreso(){

    try{

        const res = await fetch("/progreso")
        const data = await res.json()

        let total = data.total || 0
        let enviados = data.enviados || 0
        let errores = data.errores || 0

        if(total === 0){
            document.getElementById("contador").innerText = "Preparando envío..."
            return
        }

        let porcentaje = Math.min((enviados / total) * 100, 100)

        document.getElementById("barra").style.width = porcentaje + "%"
        document.getElementById("porcentaje").innerText = Math.round(porcentaje) + "%"
        document.getElementById("contador").innerText =
            enviados + " / " + total + " correos enviados"

        if(enviados >= total){

            document.getElementById("progresoContainer").style.display = "none"
            document.getElementById("finalizado").style.display = "block"

            let enviadosCorrectos = total - errores

            let resumenHTML = `
              <p style="font-size:18px;"><b>Correos enviados correctamente:</b> <span style="color:#5b2c83;">${enviadosCorrectos}</span></p>
              <p style="font-size:18px;"><b>Errores detectados:</b> <span style="color:${errores > 0 ? '#b30000' : '#5b2c83'};">${errores}</span></p>
            `

            if(errores > 0){
                resumenHTML += `
                <p style="color:#b30000; margin-top:10px;">
                Algunos correos no se pudieron enviar.<br>
                Dirígete al apartado <b>Errores</b> para intentar reenviarlos.
                </p>
                `
            }

            document.getElementById("resumen").innerHTML = resumenHTML

            clearInterval(intervalo)

        }

    }catch(e){
        console.error("Error obteniendo progreso:", e)
    }

}

let intervalo = setInterval(actualizarProgreso, 1000)

</script>

{% endblock %}
