{% extends "base.html" %}

{% block content %}

<h1>Nueva circularización</h1>

<form action="/enviar" method="post" enctype="multipart/form-data">

<h3>Excel</h3>

<div class="drop-zone" id="excelDrop">
<p>Arrastra aquí el Excel o haz click</p>
<input type="file" name="excel_file" accept=".xlsx" hidden>
</div>

<ul id="excelList"></ul>

<p id="excelInfo" style="font-weight:bold;"></p>

<button type="button" onclick="clearExcel()">Limpiar Excel</button>

<br><br>

<h3>PDFs</h3>

<div class="drop-zone" id="pdfDrop">
<p>Arrastra aquí los PDFs o haz click</p>
<input type="file" name="pdf_files" multiple accept=".pdf" hidden>
</div>

<ul id="pdfList"></ul>

<p id="pdfInfo" style="font-weight:bold;"></p>

<button type="button" onclick="clearPDFs()">Limpiar PDFs</button>

<br><br>

<p>
<label>Asunto:</label><br>
<input type="text" name="asunto">
</p>

<p>
<label>Mensaje:</label><br>
<textarea name="mensaje" rows="6" cols="60"></textarea>
</p>

<button type="button" onclick="confirmarEnvio()">Enviar circularización</button>

</form>

<div id="confirmModal" class="modal">

<div class="modal-content">

<h3>Confirmar envío</h3>

<p id="confirmDestinatarios"></p>
<p id="confirmPDFs"></p>

<br>

<button onclick="enviarFormulario()">Confirmar envío</button>
<button onclick="cerrarModal()">Cancelar</button>

</div>

</div>


<style>

.drop-zone{
border:2px dashed #aaa;
padding:40px;
text-align:center;
cursor:pointer;
margin-bottom:10px;
}

.drop-zone.dragover{
background:#f0f8ff;
border-color:#007bff;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f5f5f5;
padding:5px;
margin:5px 0;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:8px;
text-align:center;
}
</style>


<script>

let pdfFiles = []

function setupDropZone(zoneId, listId){

const zone = document.getElementById(zoneId)
const input = zone.querySelector("input")
const list = document.getElementById(listId)

zone.addEventListener("click", () => input.click())

zone.addEventListener("dragover", (e)=>{
e.preventDefault()
zone.classList.add("dragover")
})

zone.addEventListener("dragleave", ()=>{
zone.classList.remove("dragover")
})

zone.addEventListener("drop",(e)=>{

e.preventDefault()
zone.classList.remove("dragover")

if(zoneId==="pdfDrop"){

addPdfFiles(e.dataTransfer.files)

}else{

input.files = e.dataTransfer.files
updateFileList(list, input.files)

if(input.files.length>0){
analizarExcel(input.files[0])
}

}

})

input.addEventListener("change", ()=>{

if(zoneId==="pdfDrop"){

addPdfFiles(input.files)

}else{

updateFileList(list, input.files)

if(input.files.length>0){
analizarExcel(input.files[0])
}

}

})

}

function addPdfFiles(files){

for(const file of files){
pdfFiles.push(file)
}

updatePdfInput()
renderPdfList()

}

function updatePdfInput(){

const input = document.querySelector("#pdfDrop input")

const dataTransfer = new DataTransfer()

pdfFiles.forEach(file => dataTransfer.items.add(file))

input.files = dataTransfer.files

document.getElementById("pdfInfo").innerText =
"PDFs cargados: " + pdfFiles.length

}

function renderPdfList(){

const list = document.getElementById("pdfList")

list.innerHTML=""

pdfFiles.forEach((file,index)=>{

const li=document.createElement("li")

li.innerHTML = `
${file.name}
<button onclick="removePdf(${index})" style="margin-left:10px;">❌</button>
`

list.appendChild(li)

})

}

function removePdf(index){

pdfFiles.splice(index,1)

updatePdfInput()
renderPdfList()

}

function updateFileList(list, files){

list.innerHTML=""

for(let i=0;i<files.length;i++){

const li=document.createElement("li")
li.innerText=files[i].name
list.appendChild(li)

}

}

function clearExcel(){

const input=document.querySelector("#excelDrop input")
const list=document.getElementById("excelList")

input.value=""
list.innerHTML=""

document.getElementById("excelInfo").innerText=""

}

function clearPDFs(){

pdfFiles = []

const input=document.querySelector("#pdfDrop input")
const list=document.getElementById("pdfList")

input.value=""
list.innerHTML=""

document.getElementById("pdfInfo").innerText=""

}

async function analizarExcel(file){

const formData = new FormData()
formData.append("excel_file", file)

const response = await fetch("/analizar_excel",{
method:"POST",
body:formData
})

const data = await response.json()

document.getElementById("excelInfo").innerText =
"Destinatarios detectados: " + data.total_destinatarios

}

setupDropZone("excelDrop","excelList")
setupDropZone("pdfDrop","pdfList")

function confirmarEnvio(){

const destinatarios = document.getElementById("excelInfo").innerText || "Destinatarios no detectados"

const totalPDF = pdfFiles.length

document.getElementById("confirmDestinatarios").innerText = destinatarios
document.getElementById("confirmPDFs").innerText = "PDFs cargados: " + totalPDF

document.getElementById("confirmModal").style.display="flex"

}

function cerrarModal(){

document.getElementById("confirmModal").style.display="none"

}

function enviarFormulario(){

document.querySelector("form").submit()

}

</script>

{% endblock %}
