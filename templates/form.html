<!DOCTYPE html>
<html>
<head>
    <title>Circularizaciones Grupo Fidelis</title>
</head>
<body>

<h1>Sistema de Circularizaciones</h1>

<form action="/enviar" method="post" enctype="multipart/form-data">

    <p>
        <label>Subir Excel:</label><br>
        <input type="file" name="excel_file" accept=".xlsx">
    </p>

    <p>
        <label>Subir PDFs:</label><br>
        <input type="file" name="pdf_files" multiple accept=".pdf">
    </p>

    <p>
        <label>Asunto del correo:</label><br>
        <input type="text" name="asunto">
    </p>

    <p>
        <label>Cuerpo del mensaje:</label><br>
        <textarea name="mensaje" rows="6" cols="60"></textarea>
    </p>

    <p>
        <label>Correo del remitente:</label><br>
        <input type="email" name="email_remitente">
    </p>

    <p>
        <label>Contraseña de aplicación:</label><br>
        <input type="password" name="password">
    </p>

    <button type="submit">Enviar circularización</button>

</form>

<br><br>

<a href="/historial">Ver historial de circularizaciones</a>

</body>
</html>
