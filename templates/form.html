{% extends "base.html" %}

{% block content %}

<h1>Nueva circularización</h1>

<form action="/enviar" method="post" enctype="multipart/form-data">

<h3>Excel</h3>

<div class="drop-zone" id="excelDrop">
<p>Arrastra aquí el Excel o haz click</p>
<input type="file" name="excel_file" accept=".xlsx" hidden>
</div>

<ul id="excelList"></ul>

<button type="button" onclick="clearExcel()">Limpiar Excel</button>

<br><br>

<h3>PDFs</h3>

<div class="drop-zone" id="pdfDrop">
<p>Arrastra aquí los PDFs o haz click</p>
<input type="file" name="pdf_files" multiple accept=".pdf" hidden>
</div>

<ul id="pdfList"></ul>

<button type="button" onclick="clearPDFs()">Limpiar PDFs</button>

<br><br>

<p>
<label>Asunto:</label><br>
<input type="text" name="asunto">
</p>

<p>
<label>Mensaje:</label><br>
<textarea name="mensaje" rows="6" cols="60"></textarea>
</p>

<button type="submit">Enviar circularización</button>

</form>


<style>

.drop-zone{
border:2px dashed #aaa;
padding:40px;
text-align:center;
cursor:pointer;
margin-bottom:10px;
}

.drop-zone.dragover{
background:#f0f8ff;
border-color:#007bff;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f5f5f5;
padding:5px;
margin:5px 0;
}

</style>


<script>

function setupDropZone(zoneId, listId){

const zone = document.getElementById(zoneId)
const input = zone.querySelector("input")
const list = document.getElementById(listId)

zone.addEventListener("click", () => input.click())

zone.addEventListener("dragover", (e)=>{
e.preventDefault()
zone.classList.add("dragover")
})

zone.addEventListener("dragleave", ()=>{
zone.classList.remove("dragover")
})

zone.addEventListener("drop",(e)=>{

e.preventDefault()
zone.classList.remove("dragover")

input.files = e.dataTransfer.files

updateFileList(list, input.files)

})

input.addEventListener("change", ()=>{
updateFileList(list, input.files)
})

}

function updateFileList(list, files){

list.innerHTML=""

for(let i=0;i<files.length;i++){

const li=document.createElement("li")
li.innerText=files[i].name
list.appendChild(li)

}

}

function clearExcel(){

const input=document.querySelector("#excelDrop input")
const list=document.getElementById("excelList")

input.value=""
list.innerHTML=""

}

function clearPDFs(){

const input=document.querySelector("#pdfDrop input")
const list=document.getElementById("pdfList")

input.value=""
list.innerHTML=""

}

setupDropZone("excelDrop","excelList")
setupDropZone("pdfDrop","pdfList")

</script>

{% endblock %}
