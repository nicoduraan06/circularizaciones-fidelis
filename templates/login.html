{% extends "base.html" %}

{% block content %}

<div class="login-container">

<div class="login-card">

<h2>Grupo Fidelis</h2>
<p class="login-subtitle">Sistema de Circularizaciones</p>

<form method="post" action="/login">

<label>Usuario</label>
<input type="text" name="username" required>

<label>Contraseña</label>
<input type="password" name="password" required>

<button type="submit">Iniciar sesión</button>

</form>

</div>

</div>

<style>

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
}

.login-card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
width:350px;
text-align:center;
}

.login-card h2{
margin-bottom:5px;
color:#2c3e50;
}

.login-subtitle{
color:#888;
margin-bottom:25px;
}

.login-card input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

.login-card button{
width:100%;
padding:10px;
background:#007bff;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.login-card button:hover{
background:#0056b3;
}

</style>

{% endblock %}
