{% extends "base.html" %}

{% block content %}

<h1>Historial de Circularizaciones</h1>

<form method="get" action="/historial" style="margin-bottom:20px; display:flex; gap:10px; align-items:center;">

<input
type="text"
name="buscar"
placeholder="Buscar por fecha, Excel o remitente"
value="{{ buscar if buscar else '' }}"
style="width:300px; margin:0;"
>

<button type="submit">Buscar</button>

<a href="/historial">
<button type="button">Limpiar</button>
</a>

</form>

<table>

<tr>
<th>Fecha</th>
<th>Excel</th>
<th>Correo remitente</th>
<th>Destinatarios</th>
</tr>

{% for r in registros %}

<tr class="fila-hover">
<td>{{ r.fecha }}</td>
<td>{{ r.excel }}</td>
<td>{{ r.correo }}</td>
<td>{{ r.destinatarios }}</td>
</tr>

{% endfor %}

</table>

<style>
.fila-hover:hover td {
background:#f3edf8;
cursor:default;
}
</style>

{% endblock %}
