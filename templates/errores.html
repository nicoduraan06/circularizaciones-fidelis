<!DOCTYPE html>
<html>
<head>
    <title>Errores de envío</title>
</head>

<body>

<h1>Historial de errores de envío</h1>

<table border="1">

<tr>
    <th>Fecha</th>
    <th>Destinatario</th>
    <th>Error</th>
</tr>

{% for e in errores %}

<tr>
    <td>{{ e.fecha }}</td>
    <td>{{ e.destinatario }}</td>
    <td>{{ e.error }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Volver al inicio</a>

</body>
</html>
