{% extends "base.html" %}

{% block content %}

<h1>Correos que no se pudieron enviar</h1>

<p>
Estos correos no se enviaron correctamente durante la circularización.
Puedes reenviarlos manualmente.
</p>

<br>

<input type="text" id="buscador" placeholder="Buscar correo..." onkeyup="buscarErrores()">

<br><br>

<table border="1" id="tablaErrores">

<tr>
    <th>Fecha</th>
    <th>Correo</th>
    <th>Acción</th>
</tr>

{% for e in errores %}

<tr>
    <td>{{ e.fecha }}</td>
    <td>{{ e.destinatario }}</td>

    <td>

        <form action="/reintentar" method="post">

            <input type="hidden" name="destinatario" value="{{ e.destinatario }}">

            <button type="submit">Reenviar</button>

        </form>

    </td>

</tr>

{% endfor %}

</table>


<script>

function buscarErrores(){

    let input = document.getElementById("buscador")
    let filtro = input.value.toLowerCase()

    let tabla = document.getElementById("tablaErrores")
    let filas = tabla.getElementsByTagName("tr")

    for(let i=1;i<filas.length;i++){

        let correo = filas[i].getElementsByTagName("td")[1]

        if(correo){

            let texto = correo.textContent.toLowerCase()

            if(texto.indexOf(filtro) > -1){
                filas[i].style.display = ""
            }else{
                filas[i].style.display = "none"
            }

        }

    }

}

</script>

{% endblock %}
