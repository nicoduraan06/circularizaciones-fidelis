{% extends "base.html" %}

{% block content %}

<h1>Correos que no se pudieron enviar</h1>

<p style="color:#666;">
Estos correos no se enviaron correctamente durante la circularización.
Puedes reenviarlos manualmente.
</p>

<input
  type="text"
  id="buscador"
  placeholder="Buscar correo..."
  onkeyup="buscarErrores()"
  style="width:300px; margin-bottom:20px;"
>

<table id="tablaErrores">

<tr>
    <th>Fecha</th>
    <th>Correo</th>
    <th>Acción</th>
</tr>

{% for e in errores %}

<tr class="fila-hover">
    <td>{{ e.fecha }}</td>
    <td>{{ e.destinatario }}</td>

    <td>
        <form action="/reintentar" method="post">
            <input type="hidden" name="destinatario" value="{{ e.destinatario }}">
            <button type="submit">Reenviar</button>
        </form>
    </td>

</tr>

{% endfor %}

</table>

<style>
.fila-hover:hover td {
background:#f3edf8;
cursor:default;
}
</style>

<script>

function buscarErrores(){

    let input = document.getElementById("buscador")
    let filtro = input.value.toLowerCase()

    let filas = document.querySelectorAll(".fila-hover")

    filas.forEach(function(fila){
        let correo = fila.getElementsByTagName("td")[1]
        if(correo){
            let texto = correo.textContent.toLowerCase()
            fila.style.display = texto.indexOf(filtro) > -1 ? "" : "none"
        }
    })

}

</script>

{% endblock %}
