{% extends "base.html" %}

{% block content %}

<h1>Usuarios del sistema</h1>

<table style="margin-bottom:40px;">

<tr>
<th>Usuario</th>
<th>Email</th>
<th>Acción</th>
</tr>

{% for username, data in usuarios.items() %}

<tr class="fila-hover">
<td>{{ username }}</td>
<td>{{ data.email }}</td>

<td>
  <form action="/eliminar_usuario" method="post">
    <input type="hidden" name="username" value="{{ username }}">
    <button type="submit" style="background:#b30000;">Eliminar</button>
  </form>
</td>

</tr>

{% endfor %}

</table>

<div class="card" style="max-width:450px;">

  <h2 style="margin-top:0; color:#5b2c83;">Crear nuevo usuario</h2>

  <form action="/crear_usuario" method="post">

    <label style="font-weight:bold; color:#333;">Usuario</label>
    <input type="text" name="username" placeholder="Nombre de usuario">

    <label style="font-weight:bold; color:#333;">Contraseña</label>
    <input type="text" name="password" placeholder="Contraseña">

    <label style="font-weight:bold; color:#333;">Email</label>
    <input type="email" name="email" placeholder="correo@grupofidelis.es">

    <button type="submit" style="width:100%; margin-top:5px;">Crear usuario</button>

  </form>

</div>

<style>
.fila-hover:hover td {
background:#f3edf8;
cursor:default;
}
</style>

{% endblock %}
