{% extends "base.html" %}

{% block content %}

<h1>Estadísticas</h1>

<div style="display:flex; gap:20px; margin-bottom:40px; flex-wrap:wrap;">

  <div class="card" style="flex:1; min-width:200px; text-align:center; border-top:4px solid #5b2c83;">
    <p style="font-size:48px; font-weight:bold; color:#5b2c83; margin:10px 0;">{{ total_circularizaciones }}</p>
    <p style="color:#666; font-size:16px; margin:0;">Circularizaciones realizadas</p>
  </div>

  <div class="card" style="flex:1; min-width:200px; text-align:center; border-top:4px solid #5b2c83;">
    <p style="font-size:48px; font-weight:bold; color:#5b2c83; margin:10px 0;">{{ total_destinatarios }}</p>
    <p style="color:#666; font-size:16px; margin:0;">Destinatarios contactados</p>
  </div>

</div>

<div class="card">
  <p style="color:#666; font-size:14px; margin:0;">
    Para consultar el detalle de cada circularización, accede al
    <a href="/historial" style="color:#5b2c83; font-weight:bold;">Historial</a>.
  </p>
</div>

{% endblock %}
